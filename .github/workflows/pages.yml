# Publishes the static landing page in marketing/ to GitHub Pages whenever
# it changes on main. The page is fully self-contained (no build step): the
# folder is uploaded as-is.
name: pages

on:
  push:
    branches: [main]
    paths: ['marketing/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: marketing
      - id: deployment
        uses: actions/deploy-pages@v4
